name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify production index.html
        run: |
          if grep -q 'src="/src/main.jsx"' dist/index.html; then
            echo "Build failed: dist/index.html still references source JSX."
            exit 1
          fi
          if ! grep -q 'src="/assets/' dist/index.html; then
            echo "Build failed: dist/index.html is missing bundled assets."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Point GitHub Pages at Actions deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          payload='{"cname":"10xwealthcreators.com","build_type":"workflow"}'

          http_code=$(curl -sS -o /tmp/pages-response.txt -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d "${payload}")

          if [ "${http_code}" = "404" ]; then
            http_code=$(curl -sS -o /tmp/pages-response.txt -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d "${payload}")
          fi

          cat /tmp/pages-response.txt

          if [ "${http_code}" != "200" ] && [ "${http_code}" != "201" ] && [ "${http_code}" != "204" ]; then
            echo "Failed to configure GitHub Pages (HTTP ${http_code})."
            exit 1
          fi

          echo "GitHub Pages is configured to deploy from GitHub Actions."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
