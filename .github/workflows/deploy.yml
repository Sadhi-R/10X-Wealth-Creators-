name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to docs/
        env:
          VITE_BASE_PATH: /docs/
        run: npm run publish:pages

      - name: Verify production bundle
        run: |
          if grep -q 'src="/src/main.jsx"' docs/index.html; then
            echo "Build failed: docs/index.html still references source JSX."
            exit 1
          fi
          if ! grep -q 'src="/docs/assets/' docs/index.html; then
            echo "Build failed: docs/index.html is missing bundled assets."
            exit 1
          fi

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs 404.html
          if git diff --staged --quiet; then
            echo "No site changes to deploy."
            exit 0
          fi
          git commit -m "Deploy site to docs/"
          git push
